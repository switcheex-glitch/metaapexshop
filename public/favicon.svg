<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="helmet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0A0A0A"/>
  <!-- Helmet outer shape -->
  <path d="M256 72 C156 72 96 152 96 256 C96 340 136 400 176 432 L196 440 L256 448 L316 440 L336 432 C376 400 416 340 416 256 C416 152 356 72 256 72Z" fill="url(#helmet)"/>
  <!-- Face plate (gold) -->
  <path d="M256 160 C206 160 168 200 160 240 L160 320 L192 360 L224 376 L256 380 L288 376 L320 360 L352 320 L352 240 C344 200 306 160 256 160Z" fill="url(#gold)"/>
  <!-- Mouth slit -->
  <rect x="208" y="330" width="96" height="8" rx="4" fill="#0A0A0A" opacity="0.7"/>
  <rect x="216" y="346" width="80" height="6" rx="3" fill="#0A0A0A" opacity="0.5"/>
  <rect x="224" y="358" width="64" height="5" rx="2.5" fill="#0A0A0A" opacity="0.4"/>
  <!-- Left eye -->
  <path d="M160 240 L208 220 L232 248 L192 280 Z" fill="url(#glow)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </path>
  <!-- Right eye -->
  <path d="M352 240 L304 220 L280 248 L320 280 Z" fill="url(#glow)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </path>
  <!-- Eye glow effect -->
  <path d="M160 240 L208 220 L232 248 L192 280 Z" fill="#22D3EE" opacity="0.3" filter="blur(8px)"/>
  <path d="M352 240 L304 220 L280 248 L320 280 Z" fill="#22D3EE" opacity="0.3" filter="blur(8px)"/>
  <!-- Forehead line -->
  <path d="M256 72 L256 160" stroke="#0A0A0A" stroke-width="6" opacity="0.4"/>
  <!-- Chin detail -->
  <path d="M224 376 L256 396 L288 376" stroke="#B45309" stroke-width="4" fill="none" opacity="0.6"/>
</svg>
